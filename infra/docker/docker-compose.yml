services:
  # --- Databases ---
  postgres:
    image: postgis/postgis:17-3.5
    container_name: rappiclone-postgres
    environment:
      POSTGRES_USER: rappiclone
      POSTGRES_PASSWORD: rappiclone_dev
      POSTGRES_DB: rappiclone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rappiclone"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: rappiclone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Message Broker ---
  kafka:
    image: bitnami/kafka:3.9
    container_name: rappiclone-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: rappiclone-kafka-ui
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: rappiclone
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # --- Search ---
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: rappiclone-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # --- Object Storage ---
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: rappiclone-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: rappiclone
      MINIO_ROOT_PASSWORD: rappiclone_dev
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MQTT Broker ---
  emqx:
    image: emqx/emqx:5.8.6
    container_name: rappiclone-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    environment:
      EMQX_NAME: rappiclone
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: rappiclone_dev
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Geo Services (self-hosted, zero Google) ---
  # Nominatim: geocoding (endereco <-> coordenadas)
  # Nota: em dev usa dados do estado do Parana (~50MB PBF)
  # Em prod, usar brasil-latest.osm.pbf (~1.5GB)
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: rappiclone-nominatim
    ports:
      - "8088:8080"
    environment:
      PBF_URL: https://download.geofabrik.de/south-america/brazil/sul-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/south-america/brazil/sul-updates/
      NOMINATIM_PASSWORD: rappiclone_dev
      IMPORT_STYLE: full
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 1g
    # Nominatim demora no primeiro boot (import de dados). Nao tem healthcheck rapido.

  # OSRM: routing e ETA
  # Requer pre-processamento do PBF. Ver scripts/dev.ps1 prepare-osrm
  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: rappiclone-osrm
    command: osrm-routed --algorithm mld /data/sul-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    profiles:
      - geo

  # --- Time-series DB (tracking history) ---
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg17
    container_name: rappiclone-timescaledb
    environment:
      POSTGRES_USER: rappiclone
      POSTGRES_PASSWORD: rappiclone_dev
      POSTGRES_DB: rappiclone_tracking
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rappiclone"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Analytics ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: rappiclone-clickhouse
    ports:
      - "8123:8123"
      - "9100:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Observability ---
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: rappiclone-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ../../infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.3.2
    container_name: rappiclone-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.6.1
    container_name: rappiclone-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../../infra/monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.4.0
    container_name: rappiclone-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: rappiclone_dev
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview.json
    volumes:
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  elasticsearch_data:
  minio_data:
  emqx_data:
  nominatim_data:
  osrm_data:
  timescaledb_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
