global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Backend services (rodam no host Windows, acessiveis via host.docker.internal)
  - job_name: rappiclone-services
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]
        labels:
          service: tenant-service
          environment: dev
      - targets: ["host.docker.internal:8002"]
        labels:
          service: identity-service
          environment: dev
      - targets: ["host.docker.internal:8003"]
        labels:
          service: user-profile-service
          environment: dev
      - targets: ["host.docker.internal:8004"]
        labels:
          service: catalog-service
          environment: dev
      - targets: ["host.docker.internal:8005"]
        labels:
          service: search-service
          environment: dev
      - targets: ["host.docker.internal:8006"]
        labels:
          service: cart-service
          environment: dev
      - targets: ["host.docker.internal:8007"]
        labels:
          service: order-service
          environment: dev
      - targets: ["host.docker.internal:8008"]
        labels:
          service: payment-service
          environment: dev
      - targets: ["host.docker.internal:8009"]
        labels:
          service: courier-service
