service {
    name = "api-gateway"
    port = 8080
    port = ${?SERVICE_PORT}
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

jwt {
    secret = "rappiclone-dev-secret-change-in-prod-minimum-256-bits-long!!"
    secret = ${?JWT_SECRET}
    issuer = "rappiclone"
}

# Enderecos dos microservices (em prod, service discovery via K8s DNS)
services {
    identity = "http://localhost:8002"
    identity = ${?IDENTITY_SERVICE_URL}

    tenant = "http://localhost:8001"
    tenant = ${?TENANT_SERVICE_URL}

    userProfile = "http://localhost:8003"
    userProfile = ${?USER_PROFILE_SERVICE_URL}

    catalog = "http://localhost:8004"
    catalog = ${?CATALOG_SERVICE_URL}

    search = "http://localhost:8005"
    search = ${?SEARCH_SERVICE_URL}

    cart = "http://localhost:8006"
    cart = ${?CART_SERVICE_URL}

    order = "http://localhost:8007"
    order = ${?ORDER_SERVICE_URL}

    payment = "http://localhost:8008"
    payment = ${?PAYMENT_SERVICE_URL}

    courier = "http://localhost:8009"
    courier = ${?COURIER_SERVICE_URL}

    tracking = "http://localhost:8010"
    tracking = ${?TRACKING_SERVICE_URL}

    notification = "http://localhost:8011"
    notification = ${?NOTIFICATION_SERVICE_URL}

    rating = "http://localhost:8012"
    rating = ${?RATING_SERVICE_URL}

    promotion = "http://localhost:8013"
    promotion = ${?PROMOTION_SERVICE_URL}

    pricing = "http://localhost:8014"
    pricing = ${?PRICING_SERVICE_URL}

    geolocation = "http://localhost:8015"
    geolocation = ${?GEOLOCATION_SERVICE_URL}

    media = "http://localhost:8016"
    media = ${?MEDIA_SERVICE_URL}
}

rateLimit {
    requestsPerMinute = 60
    requestsPerMinute = ${?RATE_LIMIT_RPM}
}
