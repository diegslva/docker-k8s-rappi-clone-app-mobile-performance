service {
    name = "identity-service"
    port = 8002
    port = ${?SERVICE_PORT}
}

database {
    url = "jdbc:postgresql://localhost:5432/rappiclone_identity"
    url = ${?DATABASE_URL}
    user = "rappiclone"
    user = ${?DATABASE_USER}
    password = "rappiclone_dev"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

kafka {
    bootstrapServers = "localhost:9094"
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
    groupId = "identity-service"
}

jwt {
    secret = "rappiclone-dev-secret-change-in-prod-minimum-256-bits-long!!"
    secret = ${?JWT_SECRET}
    issuer = "rappiclone"
    accessTokenExpirationMinutes = 30
    refreshTokenExpirationDays = 30
}

otp {
    length = 6
    expirationMinutes = 5
}
