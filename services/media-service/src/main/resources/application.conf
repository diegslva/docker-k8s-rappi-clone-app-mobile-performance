service {
    name = "media-service"
    port = 8016
    port = ${?SERVICE_PORT}
}

database {
    url = "jdbc:postgresql://localhost:5432/rappiclone_media"
    url = ${?DATABASE_URL}
    user = "rappiclone"
    user = ${?DATABASE_USER}
    password = "rappiclone_dev"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

minio {
    endpoint = "http://localhost:9000"
    endpoint = ${?MINIO_ENDPOINT}
    accessKey = "rappiclone"
    accessKey = ${?MINIO_ACCESS_KEY}
    secretKey = "rappiclone_dev"
    secretKey = ${?MINIO_SECRET_KEY}
    publicBaseUrl = "http://localhost:9000"
    publicBaseUrl = ${?MINIO_PUBLIC_BASE_URL}
    bucket = "rappiclone-media"
    bucket = ${?MINIO_BUCKET}
}
